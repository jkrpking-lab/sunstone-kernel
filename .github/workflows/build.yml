name: Build Custom Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt update
        sudo apt install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

    - name: Setup Compiler (Proton Clang)
      run: |
        mkdir clang
        cd clang
        git clone --depth=1 https://github.com/kdrag0n/proton-clang.git .
        echo "COMPILER_PATH=$(pwd)/bin" >> $GITHUB_ENV

    - name: Fetch Official Xiaomi Kernel Source
      run: |
        git clone --depth=1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b sunstone-u-oss kernel-source

    - name: Compile Kernel
      run: |
        cd kernel-source
        export PATH="${{ env.COMPILER_PATH }}:$PATH"
        export ARCH=arm64
        export SUBARCH=arm64
        
        # KernelSU इंटीग्रेशन
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
        
        # सही Defconfig फाइल को ऑटोमैटिकली ढूंढने की स्मार्ट स्क्रिप्ट
        echo "🔍 Correct defconfig फाइल ढूंढी जा रही है..."
        FOUND_CONFIG=$(find arch/arm64/configs/ -name "*sunstone*_defconfig" -o -name "*stone*_defconfig" -o -name "*sm4375*_defconfig" -o -name "*perf_defconfig" | head -n 1)
        
        if [ -z "$FOUND_CONFIG" ]; then
          echo "❌ कोई भी मैचिंग defconfig फाइल नहीं मिली!"
          exit 1
        fi
        
        # 'arch/arm64/configs/' वाले हिस्से को हटाकर नाम साफ़ करना
        DEFCONFIG_NAME=$(echo "$FOUND_CONFIG" | sed 's|arch/arm64/configs/||')
        echo "✅ फाइल मिल गई: $DEFCONFIG_NAME"
        
        # कंपाइल करना शुरू करें
        make O=out "$DEFCONFIG_NAME"
        make -j$(nproc --all) O=out CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        
    - name: Check and Package Kernel
      run: |
        cd kernel-source
        if [ -f "out/arch/arm64/boot/Image" ]; then
          echo "🎉 कर्नल सफलतापूर्वक बन गया है!"
          mkdir ../output
          cp out/arch/arm64/boot/Image ../output/
        else
          echo "❌ कंपाइलेशन फेल हो गया।"
          exit 1
        fi

    - name: Upload Kernel Image
      uses: actions/upload-artifact@v4
      with:
        name: Custom-Kernel-Sunstone
        path: output/Image
