name: Build Custom Kernel (Debug Mode)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt update
        sudo apt install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

    - name: Setup Compiler (Proton Clang)
      run: |
        mkdir clang
        cd clang
        git clone --depth=1 https://github.com/kdrag0n/proton-clang.git .
        echo "COMPILER_PATH=$(pwd)/bin" >> $GITHUB_ENV

    - name: Fetch Official Xiaomi Kernel Source
      run: |
        git clone --depth=1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b sunstone-u-oss kernel-source

    - name: Compile Kernel
      run: |
        cd kernel-source
        export PATH="${{ env.COMPILER_PATH }}:$PATH"
        export ARCH=arm64
        export SUBARCH=arm64
        
        # KernelSU इंटीग्रेशन
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
        
        make O=out ARCH=arm64 defconfig
        
        if [ -f "arch/arm64/configs/vendor/bengal_GKI.config" ]; then
          scripts/kconfig/merge_config.sh -O out out/.config arch/arm64/configs/vendor/bengal_GKI.config
        fi
        
        echo "🚀 Compiling and saving logs to build.log..."
        # 2>&1 | tee कमांड से स्क्रीन का सारा आउटपुट फाइल में सेव होगा
        make -j$(nproc --all) O=out ARCH=arm64 \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
          LLVM=1 LLVM_IAS=1 \
          KCFLAGS="-Wno-error" 2>&1 | tee ../build.log
        
    - name: Check and Package Kernel
      run: |
        cd kernel-source
        if [ -f "out/arch/arm64/boot/Image" ]; then
          echo "🎉 कर्नल सफलतापूर्वक बन गया है!"
          mkdir ../output
          cp out/arch/arm64/boot/Image ../output/
        else
          echo "❌ कंपाइलेशन फेल हो गया।"
          exit 1
        fi

    - name: Upload Kernel Image
      uses: actions/upload-artifact@v4
      with:
        name: Sunstone-Kernel-Final
        path: output/Image

    - name: Upload Error Log (फेल होने पर भी काम करेगा)
      uses: actions/upload-artifact@v4
      if: always() # यह कमांड सुनिश्चित करेगा कि फेल होने पर भी हमें फाइल मिल जाए
      with:
        name: Error-Log-File
        path: build.log
